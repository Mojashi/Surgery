name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Build arm64
        run: wails build -platform darwin/arm64

      - name: List build output
        run: ls -la build/bin/

      - name: Zip
        run: |
          cd build/bin
          zip -r surgery-darwin-arm64.zip *.app

      - uses: actions/upload-artifact@v4
        with:
          name: surgery-darwin-arm64
          path: build/bin/surgery-darwin-arm64.zip

  build-macos-amd64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Build amd64
        run: wails build -platform darwin/amd64

      - name: Zip
        run: |
          cd build/bin
          zip -r surgery-darwin-amd64.zip *.app

      - uses: actions/upload-artifact@v4
        with:
          name: surgery-darwin-amd64
          path: build/bin/surgery-darwin-amd64.zip

  release:
    needs: [build-macos-arm64, build-macos-amd64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            surgery-darwin-arm64.zip
            surgery-darwin-amd64.zip
          generate_release_notes: true
